# BHARAT JANSETU PRODUCTION ORCHESTRATOR
# STITCHES 75-DISTRICT BACKEND + 100% PRECISION AI UNIFIED STACK

services:
  # 1. MongoDB - High Availability Local Store
  mongodb:
    image: mongo:7.0
    container_name: jansetu_database
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - jansetu_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # 1.5 Redis - Job Queue Store
  redis:
    image: redis:7-alpine
    container_name: jansetu_redis
    ports:
      - "6379:6379"
    networks:
      - jansetu_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # 2. AI Service - FastAPI / spaCy NLP Unit
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: jansetu_ai
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    networks:
      - jansetu_net
    depends_on:
      mongodb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2GB # Guard against spaCy memory leaks
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  # 3. Backend Service - Node.js Node logic
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jansetu_backend
    environment:
      - MONGO_URI=mongodb://mongodb/jansetu_v2
      - JWT_SECRET=${JWT_SECRET:-jan-setu-secure-2026}
      - AI_SERVICE_URL=http://ai-service:8000
      - REDIS_HOST=redis
      - NODE_ENV=production
    ports:
      - "5000:5000"
    networks:
      - jansetu_net
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    restart: always

  # 4. Nginx - Gateway Armor
  gateway:
    image: nginx:alpine
    container_name: jansetu_gateway
    volumes:
      - ./backend/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - jansetu_net
    depends_on:
      - backend
    restart: always

networks:
  jansetu_net:
    driver: bridge

volumes:
  mongodb_data:
